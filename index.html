<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国传统剪纸 - 交互体验</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 中国传统花纹背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(200, 50, 50, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(200, 50, 50, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 200, 100, 0.05) 0%, transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 标题样式 */
        .header {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid #CC0000;
        }

        .title {
            color: #ffd700;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 5px;
            letter-spacing: 0.2em;
        }

        .subtitle {
            color: #ffcccc;
            font-size: 1em;
            opacity: 0.9;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            padding: 10px 15px;
            gap: 15px;
        }

        /* 左侧控制面板 */
        .control-panel {
            width: 200px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #CC0000;
        }

        .panel-title {
            color: #ffd700;
            font-size: 1.1em;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid #CC0000;
            padding-bottom: 8px;
        }

        /* 纸张形状选择 */
        .shape-selector {
            margin-bottom: 15px;
        }

        .shape-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .shape-btn {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(204, 0, 0, 0.3);
            border: 2px solid #CC0000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .shape-btn:hover, .shape-btn.active {
            background: rgba(204, 0, 0, 0.6);
            border-color: #FFFFFF;
            transform: scale(1.05);
        }

        /* 形状图标 */
        .shape-icon {
            display: block;
            width: 24px;
            height: 24px;
            background: #ffcccc;
        }

        /* 方形 */
        .square-icon {
            border-radius: 2px;
        }

        /* 圆形 */
        .circle-icon {
            border-radius: 50%;
        }

        /* 三角形 */
        .triangle-icon {
            width: 0;
            height: 0;
            background: transparent;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #ffcccc;
        }

        /* 菱形 */
        .diamond-icon {
            width: 16px;
            height: 16px;
            background: #ffcccc;
            transform: rotate(45deg);
            border-radius: 2px;
        }

        /* 心形 */
        .heart-icon {
            width: 20px;
            height: 18px;
            background: transparent;
            position: relative;
        }
        .heart-icon::before,
        .heart-icon::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 16px;
            background: #ffcccc;
            border-radius: 10px 10px 0 0;
        }
        .heart-icon::before {
            left: 10px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .heart-icon::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        /* 星形 */
        .star-icon {
            width: 0;
            height: 0;
            background: transparent;
            margin-top: 10px;
            margin-left: 2px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 7px solid #ffcccc;
            position: relative;
        }
        .star-icon::before,
        .star-icon::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            background: transparent;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
        }
        .star-icon::before {
            border-bottom: 7px solid #ffcccc;
            top: -4px;
            left: -10px;
            transform: rotate(72deg);
            transform-origin: 50% 100%;
        }
        .star-icon::after {
            border-bottom: 7px solid #ffcccc;
            top: -4px;
            left: -10px;
            transform: rotate(-72deg);
            transform-origin: 50% 100%;
        }

        /* 摄像头预览 */
        .camera-preview {
            margin-top: 15px;
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #CC0000;
        }

        .input_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 镜像显示 */
        }

        .hands_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        /* 中间画布区域 */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .paper-container {
            position: relative;
            width: 800px;
            height: 800px;
            background: #ffffff;
            border-radius: 20px;
            border: 3px solid #CC0000;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .paper-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 剪纸效果层 */
        .cut-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 右侧说明面板 */
        .instruction-panel {
            width: 220px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #CC0000;
        }

        .gesture-demo {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .gesture-title {
            color: #ffd700;
            font-size: 0.95em;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .gesture-icon {
            font-size: 1.3em;
        }

        .gesture-desc {
            color: #ffcccc;
            font-size: 0.85em;
            line-height: 1.3;
        }

        /* 状态指示器 */
        .status-indicator {
            margin-top: 15px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            text-align: center;
        }

        .status-text {
            color: #ffd700;
            font-size: 1em;
        }

        .status-value {
            color: #4CAF50;
            font-weight: bold;
        }

        /* 工具按钮 */
        .tools-section {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, #CC0000 0%, #990000 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .tool-btn:hover {
            background: linear-gradient(135deg, #FF0000 0%, #CC0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.4);
        }

        /* 装饰元素 */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        .cloud-1 {
            top: 10%;
            left: 5%;
            font-size: 3em;
            opacity: 0.2;
            animation: float 20s ease-in-out infinite;
        }

        .cloud-2 {
            top: 70%;
            right: 5%;
            font-size: 4em;
            opacity: 0.15;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-20px) translateX(10px); }
        }

        /* 手势提示 */
        .gesture-hint {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            border: 1px solid #CC0000;
        }

        /* 加载提示 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-text {
            color: #ffd700;
            font-size: 1.5em;
            margin-top: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #CC0000;
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* 剪刀动画效果 */
        .scissor-effect {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 100;
            font-size: 2em;
            animation: scissorCut 0.3s ease-out forwards;
        }

        @keyframes scissorCut {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(-20deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration cloud-1">☁️</div>
    <div class="decoration cloud-2">☁️</div>

    <!-- 加载界面 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载手部识别模型...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="title">中国传统剪纸</h1>
            <p class="subtitle">用手势控制，体验非遗文化之美</p>
        </div>

        <div class="main-content">
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <div class="panel-title">选择纸张形状</div>
                <div class="shape-selector">
                    <div class="shape-grid">
                        <button class="shape-btn active" data-shape="square" title="方形">
                            <span class="shape-icon square-icon"></span>
                        </button>
                        <button class="shape-btn" data-shape="circle" title="圆形">
                            <span class="shape-icon circle-icon"></span>
                        </button>
                        <button class="shape-btn" data-shape="triangle" title="三角形">
                            <span class="shape-icon triangle-icon"></span>
                        </button>
                        <button class="shape-btn" data-shape="diamond" title="菱形">
                            <span class="shape-icon diamond-icon"></span>
                        </button>
                        <button class="shape-btn" data-shape="heart" title="心形">
                            <span class="shape-icon heart-icon"></span>
                        </button>
                        <button class="shape-btn" data-shape="star" title="星形">
                            <span class="shape-icon star-icon"></span>
                        </button>
                    </div>
                </div>

                <div class="panel-title">摄像头预览</div>
                <div class="camera-preview">
                    <div class="camera-container">
                        <video class="input_video" id="inputVideo"></video>
                        <canvas class="hands_canvas" id="handsCanvas"></canvas>
                    </div>
                </div>

                <div class="tools-section">
                    <button class="tool-btn" id="resetBtn">重置纸张</button>
                    <button class="tool-btn" id="completeBtn">✨ 完成剪纸</button>

                </div>
            </div>

            <!-- 中间画布区域 -->
            <div class="canvas-area">
                <div class="paper-container" id="paperContainer">
                    <canvas class="paper-canvas" id="paperCanvas"></canvas>
                </div>
            </div>

            <!-- 右侧说明面板 -->
            <div class="instruction-panel">
                <div class="panel-title">操作指南</div>
                
                <div class="gesture-demo">
                    <div class="gesture-title">
                        <span class="gesture-icon">🙌</span>
                        双手张开 - 缩放画布
                    </div>
                    <div class="gesture-desc">
                        两只手都张开时<br>
                        双手靠近缩小，双手远离放大
                    </div>
                </div>

                <div class="gesture-demo">
                    <div class="gesture-title">
                        <span class="gesture-icon">✋</span>
                        左手张开 - 跟随旋转
                    </div>
                    <div class="gesture-desc">
                        左手张开并转动手掌<br>
                        画板会跟随手掌角度旋转
                    </div>
                </div>

                <div class="gesture-demo">
                    <div class="gesture-title">
                        <span class="gesture-icon">✌️</span>
                        右手剪刀 - 并拢剪纸
                    </div>
                    <div class="gesture-desc">
                        伸出食指和中指，其他手指自然弯曲<br>
                        两指并拢时剪纸，分开时停止
                    </div>
                </div>

                <div class="gesture-demo">
                    <div class="gesture-title">
                        <span class="gesture-icon">✨</span>
                        完成剪纸
                    </div>
                    <div class="gesture-desc">
                        点击"完成剪纸"按钮<br>
                        自动生成中心对称完整图案
                    </div>
                </div>

                <div class="status-indicator">
                    <div class="status-text">检测状态: <span class="status-value" id="statusValue">等待摄像头...</span></div>
                </div>

                <div class="gesture-demo" style="margin-top: 10px;">
                    <div class="gesture-title">💡 小贴士</div>
                    <div class="gesture-desc" style="font-size: 0.8em;">
                        • 确保光线充足<br>
                        • 手部在摄像头范围内<br>
                        • 动作要缓慢流畅

    <script>
        // ==================== 全局变量 ====================
        const videoElement = document.getElementById('inputVideo');
        const handsCanvas = document.getElementById('handsCanvas');
        const handsCtx = handsCanvas.getContext('2d');
        const paperCanvas = document.getElementById('paperCanvas');
        const paperCtx = paperCanvas.getContext('2d');
        const paperContainer = document.getElementById('paperContainer');
        const statusValue = document.getElementById('statusValue');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // 纸张状态
        let paperState = {
            shape: 'square',
            scale: 1,
            rotation: 0,
            x: 300,
            y: 300,
            color: '#CC0000',
            pattern: null,
            cutLines: [], // 剪刀切割线条
            isCompleted: false // 是否已完成中心对称
        };

        // 手部状态
        let leftHand = null;
        let rightHand = null;
        let lastLeftHandPos = null;
        let lastRightHandPos = null;
        let lastBothHandsDistance = null;
        let isCutting = false;
        let lastCutPos = null;

        // 预定义的传统图案
        const traditionalPatterns = {
            flower: (ctx, x, y, size) => {
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const px = x + Math.cos(angle) * size;
                    const py = y + Math.sin(angle) * size;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                    
                    const innerAngle = ((i + 0.5) / 8) * Math.PI * 2;
                    const ix = x + Math.cos(innerAngle) * size * 0.4;
                    const iy = y + Math.sin(innerAngle) * size * 0.4;
                    ctx.lineTo(ix, iy);
                }
                ctx.closePath();
            },
            cloud: (ctx, x, y, w, h) => {
                ctx.beginPath();
                ctx.moveTo(x, y + h/2);
                ctx.bezierCurveTo(x, y, x + w/3, y, x + w/2, y + h/3);
                ctx.bezierCurveTo(x + w*2/3, y, x + w, y, x + w, y + h/2);
                ctx.bezierCurveTo(x + w, y + h, x + w*2/3, y + h, x + w/2, y + h*2/3);
                ctx.bezierCurveTo(x + w/3, y + h, x, y + h, x, y + h/2);
                ctx.closePath();
            }
        };

        // ==================== 初始化 ====================
        function init() {
            // 设置画布尺寸
            resizeCanvases();
            window.addEventListener('resize', resizeCanvases);

            // 初始化纸张
            initPaper();

            // 绑定形状选择按钮
            document.querySelectorAll('.shape-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    paperState.shape = btn.dataset.shape;
                    paperState.cutLines = [];
                    paperState.scale = 1;
                    paperState.rotation = 0;
                    drawPaper();
                });
            });

            // 绑定工具按钮
            document.getElementById('resetBtn').addEventListener('click', () => {
                paperState.cutLines = [];
                paperState.isCompleted = false;
                paperState.scale = 1;
                paperState.rotation = 0;
                drawPaper();
            });

            document.getElementById('completeBtn').addEventListener('click', completePaperCutting);

            document.getElementById('saveBtn').addEventListener('click', saveArtwork);

            // 初始化MediaPipe Hands
            initMediaPipe();
        }

        function resizeCanvases() {
            const container = paperContainer;
            paperCanvas.width = container.clientWidth;
            paperCanvas.height = container.clientHeight;
            paperState.x = paperCanvas.width / 2;
            paperState.y = paperCanvas.height / 2;
            
            handsCanvas.width = container.clientWidth;
            handsCanvas.height = container.clientHeight;
            
            drawPaper();
        }

        function initPaper() {
            paperState.x = paperCanvas.width / 2;
            paperState.y = paperCanvas.height / 2;
            drawPaper();
        }

        // ==================== 纸张绘制 ====================
        function drawPaper() {
            const ctx = paperCtx;
            const width = paperCanvas.width;
            const height = paperCanvas.height;

            // 清空画布
            ctx.clearRect(0, 0, width, height);

            // 保存上下文状态
            ctx.save();

            // 应用变换
            ctx.translate(paperState.x, paperState.y);
            ctx.rotate(paperState.rotation);
            ctx.scale(paperState.scale, paperState.scale);

            // 绘制纸张形状
            drawShape(ctx);

            // 绘制裁剪效果
            drawCutEffects(ctx);

            // 恢复上下文状态
            ctx.restore();
        }

        function drawShape(ctx) {
            const size = 200;
            
            ctx.fillStyle = paperState.color;
            ctx.strokeStyle = '#990000';
            ctx.lineWidth = 3;

            ctx.beginPath();

            switch (paperState.shape) {
                case 'square':
                    ctx.rect(-size/2, -size/2, size, size);
                    break;
                case 'circle':
                    ctx.arc(0, 0, size/2, 0, Math.PI * 2);
                    break;
                case 'triangle':
                    ctx.moveTo(0, -size/2);
                    ctx.lineTo(size/2, size/2);
                    ctx.lineTo(-size/2, size/2);
                    ctx.closePath();
                    break;
                case 'diamond':
                    ctx.moveTo(0, -size/2);
                    ctx.lineTo(size/2, 0);
                    ctx.lineTo(0, size/2);
                    ctx.lineTo(-size/2, 0);
                    ctx.closePath();
                    break;
                case 'heart':
                    drawHeart(ctx, 0, 0, size/2);
                    break;
                case 'star':
                    drawStar(ctx, 0, 0, 5, size/2, size/4);
                    break;
            }

            ctx.fill();
            ctx.stroke();

            // 添加纹理效果
            addPaperTexture(ctx, size);
        }

        function drawHeart(ctx, x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y + size/4);
            ctx.bezierCurveTo(x, y, x - size/2, y, x - size/2, y + size/4);
            ctx.bezierCurveTo(x - size/2, y + size/2, x, y + size*0.75, x, y + size);
            ctx.bezierCurveTo(x, y + size*0.75, x + size/2, y + size/2, x + size/2, y + size/4);
            ctx.bezierCurveTo(x + size/2, y, x, y, x, y + size/4);
            ctx.closePath();
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function addPaperTexture(ctx, size) {
            // 纯红色色块，无需额外装饰
        }

        function drawCutEffects(ctx) {
            // 使用 destination-out 模式绘制镂空效果
            ctx.globalCompositeOperation = 'destination-out';

            // 绘制所有切割线（细长的剪刀痕迹）
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            paperState.cutLines.forEach(line => {
                ctx.beginPath();
                ctx.lineWidth = line.width;
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            });

            ctx.globalCompositeOperation = 'source-over';
        }

        // ==================== MediaPipe Hands ====================
        function initMediaPipe() {
            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.3,
                minTrackingConfidence: 0.3,
                selfieMode: true
            });

            hands.onResults(onHandsResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 320,
                height: 240
            });

            camera.start()
                .then(() => {
                    loadingOverlay.classList.add('hidden');
                    statusValue.textContent = '已连接';
                    statusValue.style.color = '#4CAF50';
                })
                .catch(err => {
                    console.error('摄像头启动失败:', err);
                    statusValue.textContent = '摄像头错误';
                    statusValue.style.color = '#f44336';
                });
        }

        function onHandsResults(results) {
            // 清空手部画布
            handsCtx.save();
            handsCtx.clearRect(0, 0, handsCanvas.width, handsCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // 先收集左右手数据
                let tempLeftHand = null;
                let tempRightHand = null;
                let rightHandDetected = false;

                results.multiHandedness.forEach((handedness, index) => {
                    const landmarks = results.multiHandLandmarks[index];
                    // MediaPipe 的 label 是相对于图像视角
                    // 在镜像显示下，label 'Left' 实际上是用户的右手
                    const isUserLeft = handedness.label === 'Left';

                    if (isUserLeft) {
                        tempLeftHand = landmarks;
                    } else {
                        tempRightHand = landmarks;
                        rightHandDetected = true;
                    }

                    // 绘制手部骨架 - 左手绿色，右手红色
                    drawConnectors(handsCtx, landmarks, HAND_CONNECTIONS,
                        {color: isUserLeft ? '#00FF00' : '#FF0000', lineWidth: 2});
                    drawLandmarks(handsCtx, landmarks,
                        {color: isUserLeft ? '#00FF00' : '#FF0000', lineWidth: 1, radius: 3});
                });

                leftHand = tempLeftHand;
                rightHand = tempRightHand;

                // 更新状态显示
                if (rightHandDetected) {
                    // 检测右手是否是剪刀手势
                    const isScissor = rightHand ? detectScissorPose(rightHand) : false;
                    const isCutting = rightHand ? detectCuttingAction(rightHand) : false;

                    if (isScissor && isCutting) {
                        statusValue.textContent = '✂️ 右手剪纸中';
                    } else if (isScissor) {
                        statusValue.textContent = '✌️ 右手准备剪纸';
                    } else {
                        statusValue.textContent = '✋ 右手已识别';
                    }
                }

                // 检测两只手是否都张开
                const leftOpen = leftHand ? isHandOpen(leftHand) : false;
                const rightOpen = rightHand ? isHandOpen(rightHand) : false;

                if (leftHand && rightHand && leftOpen && rightOpen) {
                    // 两只手都张开 - 缩放模式
                    processBothHandsZoom(leftHand, rightHand);
                } else {
                    // 处理单手操作
                    lastBothHandsDistance = null;
                    if (leftHand && leftOpen) {
                        processLeftHandRotate(leftHand);
                    } else {
                        lastLeftHandPos = null;
                    }
                    if (rightHand) {
                        processRightHand(rightHand);
                    } else {
                        lastRightHandPos = null;
                    }
                }
            } else {
                leftHand = null;
                rightHand = null;
                lastLeftHandPos = null;
                lastRightHandPos = null;
                lastBothHandsDistance = null;
                statusValue.textContent = '未检测到手';
            }

            handsCtx.restore();
        }

        // ==================== 双手缩放逻辑 ====================
        function processBothHandsZoom(leftLandmarks, rightLandmarks) {
            // 获取两只手的手掌中心
            const leftCenter = leftLandmarks[9];
            const rightCenter = rightLandmarks[9];

            // 计算两只手之间的距离
            const currentDistance = Math.sqrt(
                Math.pow(leftCenter.x - rightCenter.x, 2) +
                Math.pow(leftCenter.y - rightCenter.y, 2)
            );

            if (lastBothHandsDistance) {
                // 根据距离变化计算缩放
                const scaleRatio = currentDistance / lastBothHandsDistance;
                const newScale = paperState.scale * scaleRatio;
                paperState.scale = Math.max(0.3, Math.min(5, newScale));
                statusValue.textContent = `缩放: ${paperState.scale.toFixed(2)}x`;
                drawPaper();
            }

            lastBothHandsDistance = currentDistance;
            lastLeftHandPos = null;
            lastRightHandPos = null;
        }

        // ==================== 左手旋转逻辑 ====================
        function processLeftHandRotate(landmarks) {
            // 根据手掌本身的旋转角度来控制画板
            // 使用食指根部(5)到小指根部(17)的连线角度作为手掌旋转角度
            const indexBase = landmarks[5];
            const pinkyBase = landmarks[17];

            // 计算手掌的旋转角度（垂直方向为0度）
            const handAngle = Math.atan2(
                pinkyBase.y - indexBase.y,
                pinkyBase.x - indexBase.x
            ) + Math.PI / 2; // 加上90度，让手掌向上时为0度

            // 直接设置画板旋转角度，跟随手掌旋转
            // 镜像翻转角度，让旋转方向与手的动作一致
            paperState.rotation = -handAngle;

            statusValue.textContent = '跟随旋转';
            drawPaper();
        }

        function isHandOpen(landmarks) {
            // 检查手指是否伸展
            const fingerTips = [8, 12, 16, 20]; // 食指、中指、无名指、小指指尖
            const fingerBases = [5, 9, 13, 17]; // 对应的指根
            
            let extendedCount = 0;
            for (let i = 0; i < fingerTips.length; i++) {
                const tip = landmarks[fingerTips[i]];
                const base = landmarks[fingerBases[i]];
                const wrist = landmarks[0];
                
                // 如果指尖距离手腕比指根更远，则认为手指伸展
                const tipDist = Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2));
                const baseDist = Math.sqrt(Math.pow(base.x - wrist.x, 2) + Math.pow(base.y - wrist.y, 2));
                
                if (tipDist > baseDist * 1.3) {
                    extendedCount++;
                }
            }
            
            return extendedCount >= 3;
        }

        // ==================== 右手剪刀裁剪逻辑 ====================
        function processRightHand(landmarks) {
            // 检测基本的剪刀手势姿势（食指和中指伸直，其他手指弯曲）
            const isScissorPose = detectScissorPose(landmarks);

            // 检测剪纸动作（手指并拢）
            const isCuttingAction = detectCuttingAction(landmarks);

            // 获取食指和中指的位置来计算剪刀的方向和位置
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];

            // 计算剪刀中心点（镜像坐标）
            const scissorX = (1 - (indexTip.x + middleTip.x) / 2) * paperCanvas.width;
            const scissorY = (indexTip.y + middleTip.y) / 2 * paperCanvas.height;

            // 计算剪刀角度（两指方向）
            const angle = Math.atan2(middleTip.y - indexTip.y, middleTip.x - indexTip.x);
            const paperAngle = angle + paperState.rotation;

            const currentPos = {
                x: scissorX,
                y: scissorY,
                angle: angle
            };

            // 转换为纸张本地坐标
            const paperPos = screenToPaper(currentPos.x, currentPos.y);

            if (isScissorPose) {
                // 显示剪刀位置但不裁剪
                statusValue.textContent = '✌️ 准备剪纸';

                // 只有当手指并拢时才剪纸
                if (isCuttingAction) {
                    if (!isCutting) {
                        // 开始新的裁剪动作
                        isCutting = true;
                        lastCutPos = { x: paperPos.x, y: paperPos.y, angle: paperAngle };
                        showScissorEffect(currentPos.x, currentPos.y);
                        statusValue.textContent = '✂️ 剪纸！';
                        drawPaper();
                    } else {
                        // 检查是否移动了足够距离
                        if (lastCutPos) {
                            const distance = Math.sqrt(
                                Math.pow(paperPos.x - lastCutPos.x, 2) +
                                Math.pow(paperPos.y - lastCutPos.y, 2)
                            );

                            // 移动超过 10 像素就创建新的切割线
                            if (distance > 10) {
                                addCutLine(lastCutPos, { x: paperPos.x, y: paperPos.y, angle: paperAngle });
                                lastCutPos = { x: paperPos.x, y: paperPos.y, angle: paperAngle };
                                showScissorEffect(currentPos.x, currentPos.y);
                                drawPaper();
                            }
                        }
                    }
                } else {
                    // 手指分开，结束当前裁剪
                    if (isCutting) {
                        isCutting = false;
                        lastCutPos = null;
                    }
                }
            } else {
                // 不是剪刀手势，重置状态
                if (isCutting) {
                    isCutting = false;
                    lastCutPos = null;
                    statusValue.textContent = '已连接';
                    drawPaper();
                }
            }

            lastRightHandPos = currentPos;
        }

        function addCutLine(startPos, endPos) {
            // 添加一条细长的切割线（模拟剪刀刀刃）
            // 线宽 6 像素，模拟真实的剪刀剪口
            paperState.cutLines.push({
                x1: startPos.x,
                y1: startPos.y,
                x2: endPos.x,
                y2: endPos.y,
                width: 6 // 剪刀剪出的细缝宽度
            });
        }

        // 检测基本的剪刀手势姿势（食指中指伸出，其他手指可以放松）
        function detectScissorPose(landmarks) {
            // 检测食指和中指是否伸出（主要判断指尖是否高于指根，即y坐标更小）
            const indexTip = landmarks[8];
            const indexBase = landmarks[5];
            const middleTip = landmarks[12];
            const middleBase = landmarks[9];

            // 食指和中指应该伸出来（指尖在指根上方，y坐标更小）
            const indexExtended = indexTip.y < indexBase.y + 0.05;
            const middleExtended = middleTip.y < middleBase.y + 0.05;

            // 无名指和小指可以稍微放松要求，不一定要完全弯曲
            const ringTip = landmarks[16];
            const ringBase = landmarks[13];
            const pinkyTip = landmarks[20];
            const pinkyBase = landmarks[17];

            // 无名指和小指不要求完全弯曲，只要不比食指中指更伸出去即可
            const ringCurled = ringTip.y > ringBase.y - 0.1;
            const pinkyCurled = pinkyTip.y > pinkyBase.y - 0.1;

            // 只要食指中指明显伸出，且无名指小指不伸出太多就算剪刀手势
            return indexExtended && middleExtended;
        }

        // 检测剪纸动作（手指并拢）
        function detectCuttingAction(landmarks) {
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const indexBase = landmarks[5];
            const middleBase = landmarks[9];

            // 计算食指和中指指尖的距离
            const fingerDistance = Math.sqrt(
                Math.pow(indexTip.x - middleTip.x, 2) +
                Math.pow(indexTip.y - middleTip.y, 2)
            );

            // 距离小于 0.03 认为手指并拢（正在剪纸）
            // 相对于手指基座的距离来动态判断
            const baseDistance = Math.sqrt(
                Math.pow(indexBase.x - middleBase.x, 2) +
                Math.pow(indexBase.y - middleBase.y, 2)
            );

            // 当指尖距离小于基座距离的一半时，认为手指并拢
            return fingerDistance < baseDistance * 0.6;
        }

        function isFingerExtended(landmarks, tipIdx, baseIdx) {
            const wrist = landmarks[0];
            const tip = landmarks[tipIdx];
            const base = landmarks[baseIdx];
            
            const tipDist = Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2));
            const baseDist = Math.sqrt(Math.pow(base.x - wrist.x, 2) + Math.pow(base.y - wrist.y, 2));
            
            return tipDist > baseDist * 1.2;
        }

        function screenToPaper(screenX, screenY) {
            // 将屏幕坐标转换为纸张本地坐标
            const dx = screenX - paperState.x;
            const dy = screenY - paperState.y;
            
            // 逆旋转
            const cos = Math.cos(-paperState.rotation);
            const sin = Math.sin(-paperState.rotation);
            const rotX = dx * cos - dy * sin;
            const rotY = dx * sin + dy * cos;
            
            // 逆缩放
            return {
                x: rotX / paperState.scale,
                y: rotY / paperState.scale
            };
        }

        function showScissorEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'scissor-effect';
            effect.textContent = '✂️';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            paperContainer.appendChild(effect);
            
            setTimeout(() => effect.remove(), 300);
        }

        // ==================== 完成剪纸 ====================
        function completePaperCutting() {
            if (paperState.isCompleted) {
                statusValue.textContent = '已经完成';
                return;
            }

            // 根据选择的形状生成中心对称图案
            const symmetricLines = generateSymmetricPattern(paperState.cutLines, paperState.shape);

            // 合并原有的切割线和对称后的切割线
            paperState.cutLines = [...paperState.cutLines, ...symmetricLines];
            paperState.isCompleted = true;

            // 自动缩放以适应画布
            paperState.scale = 1;
            paperState.rotation = 0;

            statusValue.textContent = '✨ 剪纸完成！';
            drawPaper();

            // 显示完成效果
            showCompletionEffect();
        }

        function generateSymmetricPattern(lines, shape) {
            const symmetricLines = [];
            const numSections = getSymmetricSections(shape);
            const angleStep = (Math.PI * 2) / numSections;

            // 对每一个象限/扇区，复制并旋转图案
            for (let i = 1; i < numSections; i++) {
                const rotationAngle = i * angleStep;

                lines.forEach(line => {
                    // 旋转起点和终点
                    const rotatedStart = rotatePoint(line.x1, line.y1, rotationAngle);
                    const rotatedEnd = rotatePoint(line.x2, line.y2, rotationAngle);

                    symmetricLines.push({
                        x1: rotatedStart.x,
                        y1: rotatedStart.y,
                        x2: rotatedEnd.x,
                        y2: rotatedEnd.y,
                        width: line.width
                    });
                });
            }

            return symmetricLines;
        }

        function getSymmetricSections(shape) {
            // 根据不同形状确定对称份数
            switch (shape) {
                case 'square':
                case 'diamond':
                    return 4; // 四重对称
                case 'triangle':
                    return 3; // 三重对称
                case 'circle':
                    return 8; // 八重对称
                case 'heart':
                    return 2; // 左右对称
                case 'star':
                    return 5; // 五重对称
                default:
                    return 4;
            }
        }

        function rotatePoint(x, y, angle) {
            // 绕原点旋转点
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            return {
                x: x * cos - y * sin,
                y: x * sin + y * cos
            };
        }

        function showCompletionEffect() {
            // 显示完成动画效果
            const effect = document.createElement('div');
            effect.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 3em;
                color: #FFD700;
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
                pointer-events: none;
                z-index: 1000;
                animation: completionPulse 1s ease-out forwards;
            `;
            effect.textContent = '✨ 完成！';
            paperContainer.appendChild(effect);

            // 添加动画样式
            if (!document.getElementById('completionStyle')) {
                const style = document.createElement('style');
                style.id = 'completionStyle';
                style.textContent = `
                    @keyframes completionPulse {
                        0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
                        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
                        100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }

            setTimeout(() => effect.remove(), 1000);
        }

        // ==================== 保存作品 ====================
        function saveArtwork() {
            // 创建一个临时画布来合成最终图像
            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = 800;
            saveCanvas.height = 800;
            const ctx = saveCanvas.getContext('2d');

            // 白色背景
            ctx.fillStyle = '#f5f5dc';
            ctx.fillRect(0, 0, saveCanvas.width, saveCanvas.height);

            // 添加装饰边框
            ctx.strokeStyle = '#CC0000';
            ctx.lineWidth = 10;
            ctx.strokeRect(20, 20, saveCanvas.width - 40, saveCanvas.height - 40);

            // 复制剪纸内容
            ctx.save();
            ctx.translate(saveCanvas.width / 2, saveCanvas.height / 2);
            
            // 临时修改状态以居中绘制
            const originalX = paperState.x;
            const originalY = paperState.y;
            paperState.x = 0;
            paperState.y = 0;
            
            // 绘制纸张形状
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = paperCanvas.width;
            tempCanvas.height = paperCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            paperCtx = tempCtx;
            drawShape(tempCtx);
            drawCutEffects(tempCtx);
            paperCtx = paperCanvas.getContext('2d');

            ctx.drawImage(tempCanvas, -tempCanvas.width/2, -tempCanvas.height/2);
            
            paperState.x = originalX;
            paperState.y = originalY;
            ctx.restore();

            // 添加标题
            ctx.fillStyle = '#CC0000';
            ctx.font = 'bold 30px SimSun, serif';
            ctx.textAlign = 'center';
            ctx.fillText('中国传统剪纸', saveCanvas.width / 2, 60);

            // 下载
            const link = document.createElement('a');
            link.download = `剪纸作品_${new Date().toLocaleDateString()}.png`;
            link.href = saveCanvas.toDataURL();
            link.click();

            statusValue.textContent = '已保存';
            setTimeout(() => {
                statusValue.textContent = '已连接';
            }, 2000);
        }

        // ==================== 启动 ====================
        window.addEventListener('load', init);
    </script>
</body>
</html>
